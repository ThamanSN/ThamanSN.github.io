         flex-grow: 1;

        font-size: 1.2rem;

        margin-bottom: 0.5rem;

        color: var(--accent-color);

    .card-content p {

        font-size: 0.9rem;

    /* --- Futuristic Left-to-Right Highlight Animation --- */

    @keyframes textShine {

        0% { background-position: 0% 50%; }

        100% { background-position: 200% 50%; }

    }



    .aura-text {

        background: linear-gradient(90deg, var(--text-secondary) 0%, var(--accent-color) 40%, #a855f7 50%, var(--accent-color) 60%, var(--text-secondary) 100%);

        background-size: 200% auto;

        color: var(--accent-color);

        background-clip: text;

        -webkit-background-clip: text;

        -webkit-text-fill-color: transparent;

        animation: textShine 3s linear infinite;

        font-weight: 700;

        outline: none;

        display: inline-block;

        cursor: pointer;

        transition: transform 0.3s;

    }



    .aura-text::-webkit-details-marker {

        display: none;

    }

    

    .aura-text::before {

        content: '✦ ';

        font-size: 0.9em;

    }

    

    details[open] .aura-text::before {

        content: '✧ ';

    }



    .aura-text:hover {

        transform: scale(1.02);

    }



    /* --- Sweeping Light Effect for Buttons --- */

    @keyframes buttonSweep {

        0% { left: -100%; }

        50% { left: 200%; }

        100% { left: 200%; }

    }



    .aura-btn {

        position: relative;

        overflow: hidden;

        z-index: 1;

    }



    .aura-btn::before {

        content: '';

        position: absolute;

        top: 0;

        left: -100%;

        width: 50%;

        height: 100%;

        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);

        transform: skewX(-20deg);

        animation: buttonSweep 3s infinite linear;

        z-index: -1;

    }
